apiVersion: apps/v1
kind: Deployment
metadata:
  name: gtw-cl-hname
  labels:
    app: gtw-cl-hname
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gtw-cl-hname
  template:
    metadata:
      labels:
        app: gtw-cl-hname
    spec:
      containers:
      - name: echo-hname
        image: sysnet4admin/echo-hname
---
apiVersion: v1
kind: Service
metadata:
  name: gtw-cl-hname-svc 
spec:
  selector:
    app: gtw-cl-hname   
  ports:
    - name: http
      port: 80
      targetPort: 80 
