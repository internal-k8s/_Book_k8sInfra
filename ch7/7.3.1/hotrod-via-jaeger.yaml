# HotROD 데모 앱 — Jaeger에 직접 연결 (직접 결합 방식)
# OTel SDK가 앱에서 바로 Jaeger로 트레이스를 전송
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotrod
  labels:
    app: hotrod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hotrod
  template:
    metadata:
      labels:
        app: hotrod
    spec:
      containers:
      - name: hotrod
        image: jaegertracing/example-hotrod:1.64.0
        env:
        # 앱이 직접 Jaeger의 OTLP 엔드포인트를 알아야 함 → 결합도 높음
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://jaeger.monitoring.svc.cluster.local:4318"
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: 64Mi
          limits:
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: hotrod
spec:
  selector:
    app: hotrod
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: 8080
