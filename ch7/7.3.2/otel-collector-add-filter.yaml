apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      filter:
        error_mode: ignore
        traces:
          span:
          - 'attributes["http.target"] == "/config"'
          - 'attributes["http.route"] == "/config"'
      batch:
        timeout: 5s
        send_batch_size: 1024

    exporters:
      otlp/jaeger:
        endpoint: jaeger.monitoring.svc.cluster.local:4317
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch, filter]
          exporters: [otlp/jaeger]
