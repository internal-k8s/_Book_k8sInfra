apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: canary-nginx
spec:
  replicas: 4
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: canary-nginx
  strategy:
    canary:
      steps:
      # 1단계: 25% 트래픽을 새 버전으로
      - setWeight: 25
      # 수동 승격 대기 (kubectl argo rollouts promote canary-nginx)
      - pause: {}
      # 2단계: 50%로 확대
      - setWeight: 50
      - pause: {duration: 30s}
      # 3단계: 75%로 확대
      - setWeight: 75
      - pause: {duration: 30s}
      # 이후 자동으로 100% 전환
  template:
    metadata:
      labels:
        app: canary-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.25.5
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: 32Mi
          limits:
            memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: canary-nginx
spec:
  selector:
    app: canary-nginx
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
