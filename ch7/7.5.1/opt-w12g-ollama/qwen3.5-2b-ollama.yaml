apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-qwen35-2b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama-qwen35-2b
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ollama-qwen35-2b
    spec:
      containers:
      - image: sysnet4admin/ollama-qwen3.5:2b
        imagePullPolicy: IfNotPresent
        name: ollama-qwen35-2b
        ports:
        - containerPort: 11434
          protocol: TCP
      nodeSelector:
        kubernetes.io/hostname: w3-k8s
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-qwen35-2b
spec:
  ports:
  - port: 11434
    protocol: TCP
    targetPort: 11434
  selector:
    app: ollama-qwen35-2b
