apiVersion: v1
kind: ConfigMap
metadata:
  name: compare-sllm-script
data:
  compare-sllm.sh: |
    #!/bin/sh
    # 7.5.2 — sLLM 품질 비교 테스트 (Pod 내부에서 실행) [opt-w12g-ollama]

    SERVICES="ollama-gemma3-4b ollama-qwen35-2b ollama-qwen35-4b"
    MODELS="gemma3:4b qwen3.5:2b qwen3.5:4b"
    NAMES="Gemma3-4B Qwen3.5-2B Qwen3.5-4B"

    echo "============================================"
    echo " 7.5.2 sLLM 품질 비교 테스트"
    echo "============================================"
    echo ""

    # Test 1: English
    echo "# Test 1: What is Kubernetes?"
    echo "---"

    i=1
    for svc in $SERVICES; do
      model=$(echo $MODELS | cut -d' ' -f$i)
      name=$(echo $NAMES | cut -d' ' -f$i)
      case "$model" in qwen*) THINK='"think":false,' ;; *) THINK="" ;; esac
      echo ">> $name:"
      curl -s "http://${svc}:11434/api/chat" \
        -d "{\"model\":\"${model}\",${THINK}\"messages\":[{\"role\":\"user\",\"content\":\"What is Kubernetes? Answer in 3 sentences.\"}],\"stream\":false}" \
        | sed 's/.*"content":"//;s/"\},"done.*//' | sed 's/\\n/\n/g'
      echo ""
      echo ""
      i=$((i+1))
    done

    # Test 2: Korean
    echo "# Test 2: 파드(Pod)란? (한국어)"
    echo "---"
    i=1
    for svc in $SERVICES; do
      model=$(echo $MODELS | cut -d' ' -f$i)
      name=$(echo $NAMES | cut -d' ' -f$i)
      case "$model" in qwen*) THINK='"think":false,' ;; *) THINK="" ;; esac
      echo ">> $name:"
      curl -s "http://${svc}:11434/api/chat" \
        -d "{\"model\":\"${model}\",${THINK}\"messages\":[{\"role\":\"user\",\"content\":\"쿠버네티스의 파드(Pod)란 무엇인지 2문장으로 설명해주세요.\"}],\"stream\":false}" \
        | sed 's/.*"content":"//;s/"\},"done.*//' | sed 's/\\n/\n/g'
      echo ""
      echo ""
      i=$((i+1))
    done

    echo "============================================"
    echo " 결론: 작은 모델 하나로는 부족합니다."
    echo " 7.5.3에서 MoA(다중 모델 협업)로 극복합니다."
    echo "============================================"
---
apiVersion: v1
kind: Pod
metadata:
  name: compare-sllm
  labels:
    app: compare-sllm
spec:
  restartPolicy: Never
  containers:
  - name: compare-sllm
    image: curlimages/curl
    command: ["/bin/sh", "/scripts/compare-sllm.sh"]
    volumeMounts:
    - name: script
      mountPath: /scripts
  volumes:
  - name: script
    configMap:
      name: compare-sllm-script
      defaultMode: 0755
