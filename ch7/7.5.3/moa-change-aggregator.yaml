    args: ["What is Kubernetes and why is it important?", "ollama-gemma3-270m", "gemma3:270m"]
    volumeMounts:
    - name: script
      mountPath: /scripts
  volumes:
  - name: script
    configMap:
      name: moa-script
      defaultMode: 0755
