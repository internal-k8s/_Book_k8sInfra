apiVersion: v1
kind: Pod
metadata:
  name: moa-compare-korean
spec:
  restartPolicy: Never
  containers:
  - name: compare
    image: curlimages/curl
    command: ["/bin/sh", "/scripts/compare.sh"]
    args: ["Docker와 Kubernetes의 차이점을 설명해주세요."]
    volumeMounts:
    - name: script
      mountPath: /scripts
  volumes:
  - name: script
    configMap:
      name: moa-compare-script
      defaultMode: 0755
