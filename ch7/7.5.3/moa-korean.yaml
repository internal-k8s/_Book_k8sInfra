apiVersion: v1
kind: Pod
metadata:
  name: moa-korean
spec:
  restartPolicy: Never
  containers:
  - name: moa
    image: curlimages/curl
    command: ["/bin/sh", "/scripts/moa.sh"]
    args: ["Docker와 Kubernetes의 차이점을 설명해주세요.", "ollama-llama32-1b", "llama3.2:1b"]
    volumeMounts:
    - name: script
      mountPath: /scripts
  volumes:
  - name: script
    configMap:
      name: moa-script
      defaultMode: 0755
